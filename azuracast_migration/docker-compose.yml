name: bantuwave

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-bantuwave}
      - POSTGRES_USER=${POSTGRES_USER:-bantuwave}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-bantuwave_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    volumes:
      - station_media:/app/media
      - static_data:/app/staticfiles
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-bantuwave}:${POSTGRES_PASSWORD:-bantuwave_password}@db:5432/${POSTGRES_DB:-bantuwave}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,backend,frontend,web}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/health/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    command: celery -A bantuwave worker -l info
    volumes:
      - station_media:/app/media
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-bantuwave}:${POSTGRES_PASSWORD:-bantuwave_password}@db:5432/${POSTGRES_DB:-bantuwave}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      backend:
        condition: service_healthy

  beat:
    build:
      context: ./backend
    restart: unless-stopped
    command: celery -A bantuwave beat -l info --pidfile=/tmp/celerybeat.pid -s /tmp/celerybeat-schedule
    volumes:
      - station_media:/app/media
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-bantuwave}:${POSTGRES_PASSWORD:-bantuwave_password}@db:5432/${POSTGRES_DB:-bantuwave}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      backend:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  station_media:
  static_data:
