name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: azuracast_migration/backend
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: bantuwave
          POSTGRES_PASSWORD: bantuwave_password
          POSTGRES_DB: test_bantuwave
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bantuwave -d test_bantuwave"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgres://bantuwave:bantuwave_password@localhost:5432/test_bantuwave
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test-secret-key-for-ci
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint (syntax / fatal)
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Django system check
        run: python manage.py check
      - name: Tests
        run: python manage.py test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: azuracast_migration/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: azuracast_migration/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
